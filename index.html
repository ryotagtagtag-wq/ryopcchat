<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ntfy Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-inbound {
            border-bottom-left-radius: 2px;
        }
        .message-outbound {
            border-bottom-right-radius: 2px;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        #chat-container {
            height: calc(100vh - 140px);
        }
        @media (max-width: 640px) {
            #sidebar {
                display: none;
            }
            #sidebar.active {
                display: block;
                position: absolute;
                z-index: 50;
                width: 80%;
                height: 100%;
            }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans h-screen overflow-hidden">

<div class="flex h-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-slate-800 text-white flex flex-col transition-all duration-300 border-r border-slate-700">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center">
            <h1 class="text-xl font-bold italic text-blue-400 tracking-tighter">ntfy Chat</h1>
            <button id="close-sidebar" class="sm:hidden text-slate-400">✕</button>
        </div>
        
        <div class="p-4">
            <button id="add-topic-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg flex items-center justify-center transition-colors shadow-md">
                <span class="mr-2">+</span> 新規ルーム追加
            </button>
        </div>

        <div id="topic-list" class="flex-1 overflow-y-auto px-2 space-y-1">
            <!-- Topics will be rendered here -->
        </div>

        <!-- User Settings -->
        <div class="p-4 border-t border-slate-700 bg-slate-900/50">
            <label class="text-[10px] text-slate-400 uppercase tracking-wider block mb-1">あなたのユーザー名</label>
            <div class="flex items-center group">
                <input 
                    id="username-input" 
                    type="text" 
                    class="bg-transparent border-b border-transparent hover:border-slate-500 focus:border-blue-500 focus:outline-none text-sm font-medium w-full py-1 transition-colors"
                    placeholder="名前を入力..."
                    title="クリックして名前を変更"
                >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-500 group-hover:text-blue-400 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </div>
            <p class="text-[9px] text-slate-500 mt-2 italic">※ブラウザに保存されます</p>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative bg-[#f0f2f5]">
        <!-- Chat Header -->
        <header class="bg-white h-16 border-b border-slate-200 flex items-center px-4 justify-between shadow-sm z-10">
            <div class="flex items-center">
                <button id="open-sidebar" class="sm:hidden mr-3 text-slate-600">☰</button>
                <div>
                    <h2 id="current-topic-name" class="font-bold text-slate-800 text-lg leading-tight">ルームを選択してください</h2>
                    <p id="connection-status" class="text-xs text-slate-400 flex items-center mt-0.5">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-300 mr-1.5 transition-colors duration-500"></span>
                        <span id="status-text">待機中</span>
                    </p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button id="clear-chat" class="text-slate-400 hover:text-red-500 p-2 transition-colors" title="履歴を削除">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Messages Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Messages appear here -->
            <div class="flex flex-col items-center justify-center h-full text-slate-400 italic">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <p>サイドバーからルームを選んでください</p>
            </div>
        </div>

        <!-- Input Area -->
        <footer id="input-area" class="bg-white p-4 border-t border-slate-200 hidden">
            <form id="chat-form" class="flex items-end space-x-2 max-w-4xl mx-auto">
                <div class="flex-1 relative">
                    <textarea 
                        id="message-input" 
                        rows="1" 
                        placeholder="メッセージを入力..." 
                        class="w-full bg-slate-100 border-0 rounded-2xl py-3 px-4 focus:ring-2 focus:ring-blue-500 outline-none resize-none overflow-hidden max-h-32"
                    ></textarea>
                </div>
                <button type="submit" class="bg-blue-600 text-white p-3 rounded-full hover:bg-blue-700 transition-colors shadow-lg active:scale-95 duration-75">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
        </footer>
    </main>
</div>

<!-- Add Topic Modal -->
<div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[60] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 transform transition-all scale-100">
        <h3 class="text-xl font-bold mb-2 text-slate-800">新しいルームを追加</h3>
        <p class="text-sm text-slate-500 mb-5">ntfy.sh上のトピック名を指定してください。</p>
        <div class="relative mb-6">
            <span class="absolute left-3 top-3 text-slate-400 text-sm">ntfy.sh/</span>
            <input 
                id="topic-input" 
                type="text" 
                placeholder="topic-name" 
                class="w-full border border-slate-300 rounded-xl p-3 pl-[64px] focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            >
        </div>
        <div class="flex justify-end space-x-3">
            <button id="cancel-modal" class="px-4 py-2 text-slate-500 hover:text-slate-800 transition-colors">キャンセル</button>
            <button id="confirm-modal" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold transition-all shadow-lg active:scale-95">作成</button>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    const state = {
        topics: JSON.parse(localStorage.getItem('ntfy_topics')) || [],
        activeTopic: null,
        chatHistory: JSON.parse(localStorage.getItem('ntfy_history')) || {},
        username: localStorage.getItem('ntfy_username') || '名無しのユーザー_' + Math.floor(Math.random() * 900 + 100),
        socket: null
    };

    // --- DOM Elements ---
    const topicListEl = document.getElementById('topic-list');
    const chatContainer = document.getElementById('chat-container');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const currentTopicName = document.getElementById('current-topic-name');
    const inputArea = document.getElementById('input-area');
    const addTopicBtn = document.getElementById('add-topic-btn');
    const modalOverlay = document.getElementById('modal-overlay');
    const topicInput = document.getElementById('topic-input');
    const cancelModal = document.getElementById('cancel-modal');
    const confirmModal = document.getElementById('confirm-modal');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const clearChatBtn = document.getElementById('clear-chat');
    const usernameInput = document.getElementById('username-input');
    const openSidebarBtn = document.getElementById('open-sidebar');
    const closeSidebarBtn = document.getElementById('close-sidebar');
    const sidebar = document.getElementById('sidebar');

    // Init username field
    usernameInput.value = state.username;

    // --- Core Functions ---

    function saveState() {
        localStorage.setItem('ntfy_topics', JSON.stringify(state.topics));
        localStorage.setItem('ntfy_history', JSON.stringify(state.chatHistory));
        localStorage.setItem('ntfy_username', state.username);
    }

    function renderTopics() {
        topicListEl.innerHTML = '';
        state.topics.forEach(topic => {
            const btn = document.createElement('button');
            btn.className = `w-full text-left p-3 rounded-xl flex items-center justify-between group transition-all mb-1 ${state.activeTopic === topic ? 'bg-blue-600 shadow-md translate-x-1' : 'hover:bg-slate-700/50'}`;
            
            btn.innerHTML = `
                <span class="truncate pr-2 text-sm font-medium ${state.activeTopic === topic ? 'text-white' : 'text-slate-300'}">${topic}</span>
                <span class="text-[10px] text-slate-500 group-hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all p-1" onclick="deleteTopic(event, '${topic}')">✕</span>
            `;
            
            btn.onclick = () => selectTopic(topic);
            topicListEl.appendChild(btn);
        });
    }

    function deleteTopic(e, topic) {
        e.stopPropagation();
        if (confirm(`ルーム「${topic}」を削除しますか？履歴も消去されます。`)) {
            state.topics = state.topics.filter(t => t !== topic);
            delete state.chatHistory[topic];
            if (state.activeTopic === topic) {
                state.activeTopic = null;
                if (state.socket) state.socket.close();
            }
            saveState();
            renderTopics();
            renderChat();
        }
    }

    function selectTopic(topic) {
        if (state.activeTopic === topic) return;
        
        state.activeTopic = topic;
        renderTopics();
        renderChat();
        inputArea.classList.remove('hidden');
        currentTopicName.textContent = topic;
        
        // Sidebar auto-close on mobile
        sidebar.classList.remove('active');

        // Connect WebSocket
        connectWebSocket(topic);
    }

    function connectWebSocket(topic) {
        if (state.socket) {
            state.socket.close();
        }

        statusText.textContent = '接続中...';
        statusDot.className = 'w-2 h-2 rounded-full bg-yellow-400 mr-1.5';

        state.socket = new WebSocket(`wss://ntfy.sh/${topic}/ws`);

        state.socket.onopen = () => {
            statusText.textContent = 'リアルタイム接続中';
            statusDot.className = 'w-2 h-2 rounded-full bg-green-500 mr-1.5 shadow-[0_0_8px_rgba(34,197,94,0.6)]';
        };

        state.socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.event === 'message') {
                handleIncomingMessage(topic, data);
            }
        };

        state.socket.onclose = () => {
            if (state.activeTopic === topic) {
                statusText.textContent = 'オフライン (再試行中)';
                statusDot.className = 'w-2 h-2 rounded-full bg-red-400 mr-1.5';
                setTimeout(() => {
                    if (state.activeTopic === topic) connectWebSocket(topic);
                }, 5000);
            }
        };
    }

    function handleIncomingMessage(topic, data) {
        let senderName = '不明なユーザー';
        let body = data.message;

        // Try to parse format "Username:Message"
        if (body.includes(':')) {
            const separatorIndex = body.indexOf(':');
            senderName = body.substring(0, separatorIndex);
            body = body.substring(separatorIndex + 1);
        }

        const msgObj = {
            id: data.id,
            sender: senderName,
            text: body,
            time: new Date(data.time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            timestamp: data.time
        };

        if (!state.chatHistory[topic]) state.chatHistory[topic] = [];
        
        // Duplicate check
        if (!state.chatHistory[topic].find(m => m.id === data.id)) {
            state.chatHistory[topic].push(msgObj);
            saveState();
            if (state.activeTopic === topic) {
                renderChat();
            }
        }
    }

    function renderChat() {
        if (!state.activeTopic) {
            chatContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-400 italic">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p>ルームを選択してください</p>
                </div>`;
            inputArea.classList.add('hidden');
            return;
        }

        const history = state.chatHistory[state.activeTopic] || [];
        chatContainer.innerHTML = '';

        if (history.length === 0) {
            chatContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-400 italic">
                    <p>メッセージがありません。会話を始めましょう！</p>
                </div>`;
        }

        history.forEach(msg => {
            const isMe = msg.sender === state.username;
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex w-full mb-1 ${isMe ? 'justify-end' : 'justify-start'}`;
            
            messageDiv.innerHTML = `
                <div class="max-w-[80%] flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    ${!isMe ? `<span class="text-[10px] text-slate-500 ml-2 mb-0.5">${escapeHtml(msg.sender)}</span>` : ''}
                    <div class="relative px-4 py-2 rounded-2xl text-sm shadow-sm transition-all ${isMe ? 'bg-blue-600 text-white message-outbound' : 'bg-white text-slate-800 border border-slate-200 message-inbound'}">
                        <div class="whitespace-pre-wrap break-words">${escapeHtml(msg.text)}</div>
                        <span class="block text-[9px] mt-1 opacity-60 text-right leading-none">${msg.time}</span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(messageDiv);
        });

        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage(text) {
        if (!state.activeTopic || !text.trim()) return;

        // Use Username:Message format
        const payload = `${state.username}:${text}`;

        try {
            await fetch(`https://ntfy.sh/${state.activeTopic}`, {
                method: 'POST',
                body: payload,
                headers: {
                    'Title': `Message from ${state.username}`
                }
            });
            messageInput.value = '';
            adjustTextareaHeight();
        } catch (error) {
            console.error('Failed to send message', error);
            showError('送信できませんでした。通信環境を確認してください。');
        }
    }

    function showError(msg) {
        const errorToast = document.createElement('div');
        errorToast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-xl shadow-2xl z-[100] transition-all animate-bounce';
        errorToast.textContent = msg;
        document.body.appendChild(errorToast);
        setTimeout(() => {
            errorToast.classList.add('opacity-0');
            setTimeout(() => errorToast.remove(), 500);
        }, 3000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function adjustTextareaHeight() {
        messageInput.style.height = 'auto';
        messageInput.style.height = (messageInput.scrollHeight) + 'px';
    }

    // --- Event Listeners ---

    // Username Change
    usernameInput.onblur = () => {
        const newName = usernameInput.value.trim();
        if (newName && newName !== state.username) {
            state.username = newName;
            saveState();
            renderChat(); // Refresh to update "isMe" status
        } else {
            usernameInput.value = state.username;
        }
    };

    usernameInput.onkeydown = (e) => {
        if (e.key === 'Enter') {
            usernameInput.blur();
        }
    };

    // Modal Events
    addTopicBtn.onclick = () => {
        modalOverlay.classList.remove('hidden');
        topicInput.focus();
    };

    cancelModal.onclick = () => {
        modalOverlay.classList.add('hidden');
        topicInput.value = '';
    };

    confirmModal.onclick = () => {
        const name = topicInput.value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
        if (name) {
            if (!state.topics.includes(name)) {
                state.topics.push(name);
                saveState();
                renderTopics();
            }
            selectTopic(name);
            modalOverlay.classList.add('hidden');
            topicInput.value = '';
        }
    };

    // Chat Events
    chatForm.onsubmit = (e) => {
        e.preventDefault();
        sendMessage(messageInput.value);
    };

    messageInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.requestSubmit();
        }
    };

    messageInput.oninput = adjustTextareaHeight;

    clearChatBtn.onclick = () => {
        if (state.activeTopic && confirm('このルームの履歴を削除しますか？\n(自分側の表示のみ削除されます)')) {
            state.chatHistory[state.activeTopic] = [];
            saveState();
            renderChat();
        }
    };

    openSidebarBtn.onclick = () => sidebar.classList.add('active');
    closeSidebarBtn.onclick = () => sidebar.classList.remove('active');

    // --- Initialization ---
    renderTopics();
    renderChat();

</script>

</body>
</html>
